version: '3.8'

services:
  sdr:
    build:
      context: ./sdr
    container_name: naviscore_sdr
    restart: always # or unless-stopped
    # devices:
    #  - /dev/bus/usb:/dev/bus/usb # Avkommentera detta på Linux (t.ex. Raspberry Pi) för riktig SDR-åtkomst
    volumes:
      - ./sdr/udev-rules:/etc/udev/rules.d:ro
    # Healthcheck to see if the device is found by lsusb and rtl_ais is running
    healthcheck:
      test: [ "CMD-SHELL", "lsusb | grep -i 'Realtek' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - navis_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: naviscore_app
    restart: unless-stopped
    ports:
      - "3000:80"
      - "10110:10110/udp" # In case we want external SDR to push to it
    environment:
      - NODE_ENV=production
      - MOCK_MODE=false # Set to true to generate fake ships for testing
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data
    depends_on:
      - sdr
    networks:
      - navis_net

networks:
  navis_net:
    driver: bridge
